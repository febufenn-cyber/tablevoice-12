<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tablevoice · Voice System</title><link rel="stylesheet" href="/styles.css"><style>main{max-width:1100px;margin:auto;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:16px}textarea,input,select{width:100%;margin:6px 0 12px}pre{white-space:pre-wrap}.version{padding:10px;border-bottom:1px solid #eee}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><h1>Restaurant Voice System</h1><p>Draft, compare, preview, activate, and roll back controlled restaurant voice versions.</p>
<div class="box"><label>Restaurant ID<input id="restaurant"></label><label>Bearer token<input id="token" type="password"></label><button id="load">Load versions</button></div>
<div class="grid"><section class="box"><h2>Versions</h2><div id="versions">Load a restaurant.</div></section><section class="box"><h2>Preview</h2><label>Voice profile ID<input id="profile"></label><label>Category<select id="category"><option>PRAISE</option><option>SPEED</option><option>STAFF</option><option>FOOD_TASTE</option><option>OTHER</option></select></label><label>Language<input id="language" value="English"></label><label>Review<textarea id="review">The food was excellent.</textarea></label><button id="preview">Preview</button><pre id="output"></pre></section></div>
<script>
const $=s=>document.querySelector(s); const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function api(path,options={}){const r=await fetch(path,{...options,headers:{'content-type':'application/json',authorization:`Bearer ${$('#token').value}`,...options.headers}});const j=await r.json();if(!r.ok)throw new Error(j.error?.message||r.statusText);return j}
$('#load').onclick=async()=>{try{const {versions}=await api(`/v1/restaurants/${$('#restaurant').value}/voice/versions`);$('#versions').innerHTML=versions.map(v=>`<div class="version"><strong>v${v.version}</strong> · ${esc(v.status)}<br>${esc(v.defaultLanguage)} · warmth ${v.warmth} · ${v.wordMin}-${v.wordMax} words<br><button data-id="${v.id}">Use in preview</button></div>`).join('')||'No versions';document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>$('#profile').value=b.dataset.id)}catch(e){$('#versions').textContent=e.message}}
$('#preview').onclick=async()=>{try{const {preview}=await api(`/v1/restaurants/${$('#restaurant').value}/voice/versions/${$('#profile').value}/preview`,{method:'POST',body:JSON.stringify({reviewText:$('#review').value,category:$('#category').value,language:$('#language').value})});$('#output').textContent=JSON.stringify(preview,null,2)}catch(e){$('#output').textContent=e.message}}
</script></main></body></html>
