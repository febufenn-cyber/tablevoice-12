name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run checks
        shell: bash
        run: |
          set +e
          npm run check > ci.log 2>&1
          status=$?
          cat ci.log
          exit $status
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-log
          path: ci.log
          if-no-files-found: error
